<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pure Stone Vibes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        .splat-tool-button {
            @apply flex flex-col items-center justify-center p-4 rounded-xl glass-panel border border-white/10 hover:border-pink-500 hover:shadow-pink-500/20 hover:shadow-lg transition-all duration-300 text-center;
            min-height: 120px; /* Ensure buttons have consistent height */
        }

        /* Modal specific styles */
        .modal-overlay {
            @apply fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 transition-opacity duration-300;
        }
        .modal-content-area {
            @apply bg-zinc-900 rounded-2xl glass-panel p-8 max-w-2xl w-full mx-4 border border-pink-500/30 shadow-2xl;
        }
    </style>
</head>

<body>
    <nav class="p-6 glass-nav flex justify-between items-center sticky top-0 z-50">
        <a href="/landing" class="group">
            <h1 class="text-xl font-bold tracking-tighter text-white uppercase group-hover:text-pink-500 transition">
                PURE STONE VIBES <span class="text-zinc-500 text-sm ml-2">/ DASHBOARD</span></h1>
        </a>
        <div class="flex items-center gap-4 text-[10px] uppercase tracking-widest font-bold text-zinc-400">
            <button onclick="toggleTheme()" class="hover:text-pink-500 transition" title="Toggle Theme">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707zM12 5a7 7 0 100 14 7 7 0 000-14z">
                    </path>
                </svg>
            </button>
            <div id="user-display" class="hidden text-pink-500 flex items-center gap-3">
                <span id="username-val"></span>
                <button onclick="logout()"
                    class="text-zinc-500 hover:text-white transition lowercase font-normal">[logout]</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-10 text-center">
            <h2 class="text-5xl mb-4 italic">Admin <span class="text-pink-500 font-bold not-italic">Splat</span> Area</h2>
            <p class="text-zinc-500 text-sm tracking-widest uppercase">Your Command Center</p>
        </header>

        <!-- Tool Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-12">
            <button class="splat-tool-button" onclick="openSplatModal('Inquiry Ledger', '/templates/_inquiry_ledger.html')">
                <span class="text-3xl text-pink-500">📜</span>
                <span class="mt-2 text-lg font-semibold text-white">Inquiry Ledger</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Server Control', '/templates/_server_control.html')">
                <span class="text-3xl text-blue-400">⚙️</span>
                <span class="mt-2 text-lg font-semibold text-white">Server Control</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Image Uploader', '/templates/_image_uploader.html')">
                <span class="text-3xl text-emerald-400">🏞️</span>
                <span class="mt-2 text-lg font-semibold text-white">Image Uploader</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Settings', '/templates/_settings.html')">
                <span class="text-3xl text-orange-400">🛠️</span>
                <span class="mt-2 text-lg font-semibold text-white">Settings</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('All Pages', '/templates/_all_pages.html')">
                <span class="text-3xl text-purple-400">🔗</span>
                <span class="mt-2 text-lg font-semibold text-white">All Pages</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('System Metrics', '/templates/_system_metrics.html')">
                <span class="text-3xl text-yellow-400">📊</span>
                <span class="mt-2 text-lg font-semibold text-white">System Metrics</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Site Statistics', '/templates/_site_statistics.html')">
                <span class="text-3xl text-red-400">📈</span>
                <span class="mt-2 text-lg font-semibold text-white">Site Statistics</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Inventory Editor', '/templates/_inventory_editor.html')">
                <span class="text-3xl text-green-400">📦</span>
                <span class="mt-2 text-lg font-semibold text-white">Inventory Editor</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Log File Viewer', '/templates/_log_file_viewer.html')">
                <span class="text-3xl text-cyan-400">📄</span>
                <span class="mt-2 text-lg font-semibold text-white">Log File Viewer</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Version Management', '/templates/_version_management.html')">
                <span class="text-3xl text-blue-400">🔖</span>
                <span class="mt-2 text-lg font-semibold text-white">Version Management</span>
            </button>
        </div>

        <!-- Single Reusable Modal -->
        <div id="splat-modal" class="modal-overlay hidden opacity-0">
            <div class="modal-content-area relative">
                <button onclick="closeSplatModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-pink-500 text-2xl">&times;</button>
                <h3 id="modal-title" class="text-2xl font-bold mb-6 text-white border-b border-white/10 pb-3"></h3>
                <div id="modal-content" class="text-zinc-300">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initial security check for the dashboard
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '/login.html'; // Redirect to login page
            }
        });

        const splatModal = document.getElementById('splat-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalContent = document.getElementById('modal-content');

        // Function to execute scripts within a given HTML string
        function executeScripts(htmlString, targetElement) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            const scripts = doc.querySelectorAll('script');

            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                Array.from(oldScript.attributes).forEach(attr => {
                    newScript.setAttribute(attr.name, attr.value);
                });
                newScript.textContent = oldScript.textContent;
                targetElement.appendChild(newScript);
            });
        }

        async function openSplatModal(title, contentUrl) {
            modalTitle.innerHTML = title;
            modalContent.innerHTML = '<p class="text-zinc-400">Loading...</p>'; // Show loading indicator
            splatModal.classList.remove('hidden', 'opacity-0');
            splatModal.classList.add('flex', 'opacity-100');
            document.body.classList.add('overflow-hidden'); // Prevent scrolling

            try {
                const response = await fetch(contentUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const html = await response.text();
                modalContent.innerHTML = ''; // Clear loading
                // Append content and then execute scripts
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                Array.from(tempDiv.children).forEach(child => modalContent.appendChild(child));
                executeScripts(html, modalContent);

            } catch (error) {
                console.error("Error loading modal content:", error);
                modalContent.innerHTML = `<p class="text-red-400">Failed to load content: ${error.message}</p>`;
            }
        }

        function closeSplatModal() {
            splatModal.classList.remove('flex', 'opacity-100');
            splatModal.classList.add('hidden', 'opacity-0');
            document.body.classList.remove('overflow-hidden');
            modalContent.innerHTML = ''; // Clear content on close
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !splatModal.classList.contains('hidden')) {
                closeSplatModal();
            }
        });
    </script>
</body>

</html>

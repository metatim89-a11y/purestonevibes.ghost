<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pure Stone Vibes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        .splat-tool-button {
            @apply flex flex-col items-center justify-center p-4 rounded-xl glass-panel border border-white/10 hover:border-pink-500 hover:shadow-pink-500/20 hover:shadow-lg transition-all duration-300 text-center;
            min-height: 120px; /* Ensure buttons have consistent height */
        }

        /* Modal specific styles */
        .modal-overlay {
            @apply fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 transition-opacity duration-300;
        }
        .modal-content-area {
            @apply bg-zinc-900 rounded-2xl glass-panel p-8 max-w-2xl w-full mx-4 border border-pink-500/30 shadow-2xl;
        }
    </style>
</head>

<body>
    <nav class="p-6 glass-nav flex justify-between items-center sticky top-0 z-50">
        <a href="/landing" class="group">
            <h1 class="text-xl font-bold tracking-tighter text-white uppercase group-hover:text-pink-500 transition">
                PURE STONE VIBES <span class="text-zinc-500 text-sm ml-2">/ DASHBOARD</span></h1>
        </a>
        <div class="flex items-center gap-4 text-[10px] uppercase tracking-widest font-bold text-zinc-400">
            <button onclick="toggleTheme()" class="hover:text-pink-500 transition" title="Toggle Theme">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707zM12 5a7 7 0 100 14 7 7 0 000-14z">
                    </path>
                </svg>
            </button>
            <div id="user-display" class="hidden text-pink-500 flex items-center gap-3">
                <span id="username-val"></span>
                <button onclick="logout()"
                    class="text-zinc-500 hover:text-white transition lowercase font-normal">[logout]</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <header class="mb-10 text-center">
            <h2 class="text-5xl mb-4 italic">Admin <span class="text-pink-500 font-bold not-italic">Splat</span> Area</h2>
            <p class="text-zinc-500 text-sm tracking-widest uppercase">Your Command Center</p>
        </header>

        <!-- Tool Buttons -->
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mb-12">
            <button class="splat-tool-button" onclick="openSplatModal('Inquiry Ledger', '/templates/_inquiry_ledger.html')">
                <span class="text-3xl text-pink-500">📜</span>
                <span class="mt-2 text-lg font-semibold text-white">Inquiry Ledger</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Server Control', '/templates/_server_control.html')">
                <span class="text-3xl text-blue-400">⚙️</span>
                <span class="mt-2 text-lg font-semibold text-white">Server Control</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Image Uploader', '/templates/_image_uploader.html')">
                <span class="text-3xl text-emerald-400">🏞️</span>
                <span class="mt-2 text-lg font-semibold text-white">Image Uploader</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Settings', '/templates/_settings.html')">
                <span class="text-3xl text-orange-400">🛠️</span>
                <span class="mt-2 text-lg font-semibold text-white">Settings</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('All Pages', getAllPagesContent())">
                <span class="text-3xl text-purple-400">🔗</span>
                <span class="mt-2 text-lg font-semibold text-white">All Pages</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('System Metrics', getSystemMetricsContent())">
                <span class="text-3xl text-yellow-400">📊</span>
                <span class="mt-2 text-lg font-semibold text-white">System Metrics</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Site Statistics', getSiteStatisticsContent())">
                <span class="text-3xl text-red-400">📈</span>
                <span class="mt-2 text-lg font-semibold text-white">Site Statistics</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Inventory Editor', getInventoryEditorContent())">
                <span class="text-3xl text-green-400">📦</span>
                <span class="mt-2 text-lg font-semibold text-white">Inventory Editor</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Log File Viewer', getLogFileViewerContent())">
                <span class="text-3xl text-cyan-400">📄</span>
                <span class="mt-2 text-lg font-semibold text-white">Log File Viewer</span>
            </button>
            <button class="splat-tool-button" onclick="openSplatModal('Version Management', getVersionManagementContent())">
                <span class="text-3xl text-blue-400">🔖</span>
                <span class="mt-2 text-lg font-semibold text-white">Version Management</span>
            </button>
        </div>

        <!-- Single Reusable Modal -->
        <div id="splat-modal" class="modal-overlay hidden opacity-0">
            <div class="modal-content-area relative">
                <button onclick="closeSplatModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-pink-500 text-2xl">&times;</button>
                <h3 id="modal-title" class="text-2xl font-bold mb-6 text-white border-b border-white/10 pb-3"></h3>
                <div id="modal-content" class="text-zinc-300">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <script src="theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initial security check for the dashboard
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = '/login.html'; // Redirect to login page
            }
        });

        const splatModal = document.getElementById('splat-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalContent = document.getElementById('modal-content');

        function openSplatModal(title, content) {
            modalTitle.innerHTML = title;
            modalContent.innerHTML = content;
            splatModal.classList.remove('hidden', 'opacity-0');
            splatModal.classList.add('flex', 'opacity-100');
            document.body.classList.add('overflow-hidden'); // Prevent scrolling
        }

        function closeSplatModal() {
            splatModal.classList.remove('flex', 'opacity-100');
            splatModal.classList.add('hidden', 'opacity-0');
            document.body.classList.remove('overflow-hidden');
            modalContent.innerHTML = ''; // Clear content on close
        }

        // Close modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !splatModal.classList.contains('hidden')) {
                closeSplatModal();
            }
        });

        // Example Content Functions (will be replaced by actual tool logic)
        function getInquiryLedgerContent() {
            // This is the original content from dashboard.html, modified to fit modal
            // In a real app, you'd fetch this data dynamically for each tool.
            return `
                <div class="glass-panel rounded-xl overflow-hidden border border-white/10 shadow-2xl mb-6">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-zinc-900 border-b border-white/5 text-[10px] uppercase tracking-widest text-pink-500 bg-pink-500/5">
                                    <th class="py-4 px-6 font-bold">Date Received</th>
                                    <th class="py-4 px-6 font-bold">Name</th>
                                    <th class="py-4 px-6 font-bold">Email</th>
                                    <th class="py-4 px-6 font-bold">Item Ref</th>
                                    <th class="py-4 px-6 font-bold">Message</th>
                                </tr>
                            </thead>
                            <tbody id="inquiriesTableBody" class="text-sm text-zinc-300 divide-y divide-white/5">
                                <tr>
                                    <td colspan="5" class="py-8 text-center text-zinc-500 italic">Loading inquiries...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <script>
                    async function fetchInquiriesForModal() {
                        const token = localStorage.getItem('sessionToken');
                        const tbody = document.getElementById('inquiriesTableBody');

                        if (!token) {
                            tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold">Not logged in. Redirecting...</td></tr>';
                            setTimeout(() => window.location.href = '/login.html', 1500);
                            return;
                        }

                        try {
                            const response = await fetch('/api/inquiries', {
                                headers: { 'Authorization': \`Bearer \${token}\` }
                            });

                            if (response.status === 403 || response.status === 401) {
                                localStorage.clear();
                                tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold">Session expired. Redirecting...</td></tr>';
                                setTimeout(() => window.location.href = '/login.html', 1500);
                                return;
                            }

                            if (!response.ok) throw new Error('Failed to fetch inquiries');

                            const inquiries = await response.json();

                            if (inquiries.length === 0) {
                                tbody.innerHTML = '<tr><td colspan="5" class="py-12 text-center text-zinc-500 italic">No inquiries found in the ledger.</td></tr>';
                                return;
                            }

                            tbody.innerHTML = ''; 

                            inquiries.forEach(inq => {
                                const date = new Date(inq.created_at).toLocaleString();
                                const tr = document.createElement('tr');
                                tr.className = "hover:bg-white/5 transition-colors cursor-default";
                                tr.innerHTML = \`
                                    <td class="py-4 px-6 whitespace-nowrap text-xs text-zinc-500 font-mono">\${date}</td>
                                    <td class="py-4 px-6 font-semibold text-white">\${inq.name}</td>
                                    <td class="py-4 px-6 text-pink-400 hover:text-pink-300"><a href="mailto:\${inq.email}">\${inq.email}</a></td>
                                    <td class="py-4 px-6"><span class="bg-zinc-800 text-xs px-2 py-1 rounded border border-white/10 uppercase tracking-widest">\${inq.sculpture}</span></td>
                                    <td class="py-4 px-6 italic text-zinc-400 max-w-xs truncate" title="\${inq.message || 'No message provided.'}">\${inq.message || '-'}</td>
                                \`;
                                tbody.appendChild(tr);
                            });

                        } catch (error) {
                            console.error("Error fetching inquiries:", error);
                            tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-red-500 font-bold">Error loading ledger data.</td></tr>';
                        }
                    }
                    // Call this function when the modal is opened with this content
                    setTimeout(fetchInquiriesForModal, 0); 
                <\/script>
            `;
        }

        function getServerControlContent() {
            return `
                <h4 class="text-xl font-bold text-white mb-4">Server Actions</h4>
                <p class="text-zinc-400 mb-6">Manage the FastAPI server directly from here.</p>
                <button class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition">Restart Server</button>
                <p class="mt-4 text-zinc-500 text-sm">Note: Server restart functionality not yet implemented.</p>
            `;
        }
        
        function getImageUploaderContent() {
            return `
                <h4 class="text-xl font-bold text-white mb-4">Upload New Images</h4>
                <p class="text-zinc-400 mb-6">Easily add new sculpture images to the namedpics directory.</p>
                <input type="file" class="block w-full text-zinc-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-pink-50 file:text-pink-700
                    hover:file:bg-pink-100 transition" />
                <button class="mt-6 bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition">Upload Image</button>
            `;
        }

        function getSettingsContent() {
            return `
                <h4 class="text-xl font-bold text-white mb-4">Application Settings</h4>
                <p class="text-zinc-400 mb-6">Configure various aspects of your Pure Stone Vibes site.</p>
                <label class="block mb-2 text-zinc-400">Theme Preference:</label>
                <select class="p-2 rounded-lg bg-zinc-800 border border-zinc-700 text-white">
                    <option>Rose (Default)</option>
                    <option>Amethyst</option>
                    <option>Emerald</option>
                </select>
                <p class="mt-4 text-zinc-500 text-sm">More settings coming soon.</p>
            `;
        }

        function getAllPagesContent() {
            const pages = [
                { name: 'Portfolio Landing', path: '/landing' },
                { name: 'Gallery (The Grove)', path: '/gallery.html' },
                { name: 'Auctions', path: '/auction.html' },
                { name: 'The Process', path: '/process.html' },
                { name: 'Inquiry Form', path: '/inquiry.html' },
                { name: 'Login Page', path: '/login.html' },
                { name: 'Stats Page', path: '/stats.html' },
                { name: 'Debugger Dashboard', path: '/debug' },
                { name: 'Admin Splat Area', path: '/splat' }
            ];

            let content = '<h4 class="text-xl font-bold text-white mb-4">All Project Pages</h4><div class="grid grid-cols-2 gap-4">';
            pages.forEach(page => {
                content += \`
                    <a href="\${page.path}" class="block p-3 rounded-lg bg-black/30 hover:bg-black/50 transition border border-white/10 text-white hover:text-pink-400">
                        <span class="font-semibold">\${page.name}</span> <span class="text-zinc-500 text-xs ml-2">\${page.path}</span>
                    </a>
                \`;
            });
            content += '</div>';
            return content;
        }

        async function getSystemMetricsContent() {
            let content = `
                <h4 class="text-xl font-bold text-white mb-4">System Resource Usage</h4>
                <div id="metrics-data" class="space-y-3">
                    <p class="text-zinc-400">Loading system metrics...</p>
                </div>
            `;

            fetch('/api/system_metrics')
                .then(response => response.json())
                .then(data => {
                    const metricsHtml = `
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">CPU Usage</span>
                            <span class="text-xs font-bold text-white">${data.cpu_percent}%</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">CPU Cores</span>
                            <span class="text-xs font-bold text-white">${data.cpu_count}</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">Memory Total</span>
                            <span class="text-xs font-bold text-white">${data.memory_total_gb} GB</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">Memory Used</span>
                            <span class="text-xs font-bold text-white">${data.memory_used_gb} GB (${data.memory_percent}%)</span>
                        </div>
                        <p class="text-[9px] text-zinc-600 uppercase tracking-widest mt-4">Last Updated: ${new Date(data.timestamp).toLocaleTimeString()}</p>
                    `;
                    document.getElementById('metrics-data').innerHTML = metricsHtml;
                })
                .catch(error => {
                    console.error('Error fetching system metrics:', error);
                    document.getElementById('metrics-data').innerHTML = `<p class="text-red-400">Failed to load metrics: ${error.message}</p>`;
                });

            return content;
        }

        async function getSiteStatisticsContent() {
            let content = `
                <h4 class="text-xl font-bold text-white mb-4">Site Statistics</h4>
                <div id="stats-data" class="space-y-3">
                    <p class="text-zinc-400">Loading site statistics...</p>
                </div>
            `;

            fetch('/api/stats', { headers: { 'Authorization': \`Bearer \${localStorage.getItem('sessionToken')}\` } })
                .then(response => response.json())
                .then(data => {
                    const statsHtml = `
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">Total Inquiries</span>
                            <span class="text-xs font-bold text-white">${data.total_inquiries}</span>
                        </div>
                        <div class="flex justify-between items-center bg-black/20 p-3 rounded-xl">
                            <span class="text-[9px] uppercase tracking-widest text-zinc-500">Unique Sculptures Inquired</span>
                            <span class="text-xs font-bold text-white">${data.unique_sculptures_inquired}</span>
                        </div>
                        <h5 class="text-sm font-semibold text-pink-400 mt-6 mb-2">Top 5 Inquired Sculptures:</h5>
                        <ul class="space-y-1">
                            ${data.top_sculptures.map(s => `<li class="text-sm"><span class="font-bold">${s.sculpture}:</span> ${s.count} inquiries</li>`).join('')}
                        </ul>
                        <h5 class="text-sm font-semibold text-pink-400 mt-6 mb-2">Recent Inquiries:</h5>
                        <ul class="space-y-1">
                            ${data.recent_inquiries.map(i => `<li class="text-sm">${i.name} - ${i.sculpture || 'N/A'} (${new Date(i.created_at).toLocaleDateString()})</li>`).join('')}
                        </ul>
                    `;
                    document.getElementById('stats-data').innerHTML = statsHtml;
                })
                .catch(error => {
                    console.error('Error fetching site statistics:', error);
                    document.getElementById('stats-data').innerHTML = `<p class="text-red-400">Failed to load statistics: ${error.message}</p>`;
                });

            return content;
        }

        async function getInventoryEditorContent() {
            let content = `
                <h4 class="text-xl font-bold text-white mb-4">Inventory Editor</h4>
                <div id="inventory-data" class="space-y-3">
                    <p class="text-zinc-400">Loading inventory...</p>
                </div>
            `;

            fetch('/api/inventory', { headers: { 'Authorization': \`Bearer \${localStorage.getItem('sessionToken')}\` } })
                .then(response => response.json())
                .then(inventory => {
                    let inventoryHtml = \`
                        <div class="space-y-4">
                            \${inventory.map(item => \`
                                <div class="bg-black/20 p-4 rounded-xl border border-white/10">
                                    <h5 class="text-lg font-bold text-white">\${item.name}</h5>
                                    <p class="text-sm text-zinc-400">\${item.description}</p>
                                    <div class="mt-4 flex gap-4">
                                        <button class="text-xs uppercase tracking-widest text-pink-500 hover:text-white" onclick="editItem('\${item.id}')">Edit</button>
                                        <button class="text-xs uppercase tracking-widest text-red-500 hover:text-white" onclick="deleteItem('\${item.id}')">Delete</button>
                                    </div>
                                </div>
                            \`).join('')}
                        </div>
                    \`;
                    document.getElementById('inventory-data').innerHTML = inventoryHtml;
                })
                .catch(error => {
                    console.error('Error fetching inventory:', error);
                    document.getElementById('inventory-data').innerHTML = `<p class="text-red-400">Failed to load inventory: ${error.message}</p>`;
                });

            return content;
        }

        async function getLogFileViewerContent() {
            let content = `
                <h4 class="text-xl font-bold text-white mb-4">Log File Viewer</h4>
                <div class="mb-4">
                    <label for="log-file-select" class="block text-sm font-medium text-zinc-400 mb-2">Select Log File:</label>
                    <select id="log-file-select" class="p-2 rounded-lg bg-zinc-800 border border-zinc-700 text-white w-full">
                        <option value="scribe.log">scribe.log</option>
                        <option value="startuplog.log">startuplog.log</option>
                    </select>
                    <button onclick="fetchLogs()" class="mt-4 bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition">Refresh Logs</button>
                </div>
                <pre id="log-content" class="bg-black/20 p-4 rounded-xl text-xs overflow-x-auto h-64 border border-white/10"></pre>
                <script>
                    async function fetchLogs() {
                        const fileName = document.getElementById('log-file-select').value;
                        const logContentElement = document.getElementById('log-content');
                        const token = localStorage.getItem('sessionToken');

                        if (!token) {
                            logContentElement.textContent = 'Not logged in. Please log in.';
                            setTimeout(() => window.location.href = '/login.html', 1500);
                            return;
                        }

                        logContentElement.textContent = 'Loading logs...';
                        try {
                            const response = await fetch(\`/api/logs/\${fileName}\`, {
                                headers: { 'Authorization': \`Bearer \${token}\` }
                            });
                            if (response.status === 403 || response.status === 401) {
                                localStorage.clear();
                                logContentElement.textContent = 'Session expired. Please log in.';
                                setTimeout(() => window.location.href = '/login.html', 1500);
                                return;
                            }
                            if (!response.ok) throw new Error(\`Failed to fetch log file: \${response.statusText}\`);
                            const logs = await response.text();
                            logContentElement.textContent = logs;
                        } catch (error) {
                            console.error('Error fetching logs:', error);
                            logContentElement.textContent = \`Error loading logs: \${error.message}\`;
                        }
                    }
                    setTimeout(fetchLogs, 0); // Initial fetch
                <\/script>
            `;
            return content;
        }

        async function getVersionManagementContent() {
            let content = `
                <h4 class="text-xl font-bold text-white mb-4">Version Management</h4>
                <div id="version-data" class="space-y-3">
                    <p class="text-zinc-400">Loading version...</p>
                </div>
            `;

            fetch('/api/version')
                .then(response => response.json())
                .then(data => {
                    const versionHtml = `
                        <p class="text-lg text-white">Current Version: <span class="font-bold text-pink-400">${data.version}</span></p>
                        <div class="mt-4">
                            <label for="new-version-input" class="block text-sm font-medium text-zinc-400 mb-2">Set New Version:</label>
                            <input type="text" id="new-version-input" value="${data.version}" class="p-2 rounded-lg bg-zinc-800 border border-zinc-700 text-white w-full">
                            <button onclick="updateVersion()" class="mt-4 bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition">Update Version</button>
                        </div>
                    `;
                    document.getElementById('version-data').innerHTML = versionHtml;
                })
                .catch(error => {
                    console.error('Error fetching version:', error);
                    document.getElementById('version-data').innerHTML = `<p class="text-red-400">Failed to load version: ${error.message}</p>`;
                });

            return content;
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grove | Pure Stone Vibes Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="gallery_style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #eeeeee;
            background-image: radial-gradient(circle at top right, #1a1010, transparent);
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gallery-card {
            background: rgba(22, 22, 22, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .gallery-card:hover {
            border-color: #ec4899;
            transform: translateY(-4px);
        }

        .price-tag {
            background: linear-gradient(to right, #ec4899, #be185d);
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 14px;
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="p-6 glass-nav flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="group">
            <h1 class="text-xl font-bold tracking-tighter text-white uppercase group-hover:text-pink-500 transition">
                PURE STONE VIBES</h1>
            <p class="text-[9px] tracking-[0.4em] text-pink-500 font-bold uppercase">← Back to Home</p>
        </a>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-widest font-bold text-zinc-400">
                <a href="process.html" class="hover:text-pink-400 transition">The Process</a>
                <a href="auction.html" class="hover:text-pink-400 transition">Auctions</a>
                <a href="inquiry.html" class="hover:text-pink-400 transition">Inquire</a>

                <!-- Auth & Theme UI -->
                <div class="flex items-center gap-4 ml-2 pl-4 border-l border-white/10">
                    <button onclick="toggleTheme()" class="hover:text-pink-500 transition" title="Toggle Theme">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707zM12 5a7 7 0 100 14 7 7 0 000-14z">
                            </path>
                        </svg>
                    </button>
                    <a href="login.html" id="login-link"
                        class="text-[10px] uppercase tracking-widest hover:text-pink-500 transition">Login</a>
                    <div id="user-display"
                        class="hidden text-[10px] uppercase tracking-widest text-pink-500 font-bold flex items-center gap-3">
                        <span id="username-val"></span>
                        <button onclick="logout()"
                            class="text-zinc-500 hover:text-white transition lowercase font-normal">[logout]</button>
                    </div>
                </div>
            </div>
            <select id="priceFilter" onchange="renderGallery()"
                class="bg-zinc-900 border border-zinc-800 text-xs px-4 py-2 rounded-full text-pink-400 font-bold focus:outline-none">
                <option value="all">Sort: All Pieces</option>
                <option value="high">Price: High to Low</option>
                <option value="low">Price: Low to High</option>
            </select>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-12 text-center">
        <h2 class="text-5xl mb-4 italic">The <span class="text-pink-500 font-bold not-italic">Grove</span></h2>
        <p class="text-zinc-500 max-w-2xl mx-auto text-sm italic">Curated Collection: <span id="collection-count">28</span> Unique Hand-Twisted Sculptures
        </p>
    </header>

    <main class="max-w-[1400px] mx-auto px-6 pb-32">
        <div id="gallery-grid-container">
            <div id="gallery-grid"></div>
        </div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90%] rounded shadow-2xl border border-white/10">
    </div>

    <script>
        let fullInventory = {}; // Holds the master list of all items

        /**
         * Fetches the master inventory data from the JSON file.
         * This ensures the gallery is always up-to-date with the latest data.
         */
        async function loadInventory() {
            try {
                const response = await fetch('inventory_final.json');
                const data = await response.json();
                fullInventory = data;
                renderGallery(); // Initial render after data is loaded
            } catch (error) {
                console.error("Failed to load inventory:", error);
                document.getElementById('gallery-grid').innerHTML = '<p class="text-pink-500">Could not load The Grove. Please try again later.</p>';
            }
        }

        /**
         * Renders the gallery grid based on current sorting and inventory state.
         */
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const sort = document.getElementById('priceFilter').value;
            grid.innerHTML = ''; // Clear existing items

            // Transform object into a list for easier sorting and iteration
            let items = Object.values(fullInventory);

            // Apply price sorting logic
            if (sort === 'high') items.sort((a, b) => b.price - a.price);
            if (sort === 'low') items.sort((a, b) => a.price - b.price);

            // Create and append a card for each sculpture
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card group cursor-pointer';

                // Lightbox integration
                card.onclick = () => {
                    document.getElementById('lightbox-img').src = `namedpics/${item.number}.${item.ext}`;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                const displayName = item.displayName;
                const priceDisplay = `$${item.price}.00`;

                card.innerHTML = `
                    <div class="relative overflow-hidden">
                        <img src="namedpics/${item.number}.${item.ext}" 
                             alt="${displayName}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute top-3 right-3 price-tag text-white shadow-lg">${priceDisplay}</div>
                    </div>
                    <div class="p-4 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="text-lg italic leading-tight group-hover:text-pink-400 transition mb-2">${displayName}</h3>
                            <p class="text-xs text-zinc-400 leading-relaxed">${item.labor_highlight}</p>
                        </div>
                        <a href="inquiry.html?item=${item.number}" class="mt-4 text-[10px] bg-pink-500/10 text-pink-500 border border-pink-500/30 px-3 py-1 rounded-full hover:bg-pink-500 hover:text-white transition uppercase tracking-tighter whitespace-nowrap text-center">
                            Inquire about this Piece
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
             // Update the collection count dynamically
            document.getElementById('collection-count').textContent = items.length;
        }

        // Initial load
        loadInventory();
    </script>
    <script src="theme.js"></script>
</body>

</html>

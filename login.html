<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pure Stone Vibes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="glass-panel max-w-md w-full p-10 space-y-8 relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-pink-500/20 blur-3xl rounded-full"></div>

        <div class="text-center relative z-10">
            <h1 class="text-4xl font-bold mb-2 italic">Access <span
                    class="text-pink-500 not-italic font-bold">Vibration</span></h1>
            <p class="text-zinc-500 text-xs uppercase tracking-[0.3em]">Demo Marketplace Entrance</p>
        </div>

        <form id="login-form" class="space-y-6 relative z-10">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2 block">Username</label>
                    <input type="text" id="username" placeholder="tester1" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-pink-500 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2 block">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-pink-500 outline-none transition">
                </div>
            </div>

            <p id="error-msg" class="text-red-400 text-[10px] uppercase tracking-widest text-center hidden">Invalid
                credentials</p>

            <button type="submit"
                class="w-full bg-pink-600 hover:bg-pink-700 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition shadow-lg shadow-pink-500/20">
                Enter Marketplace
            </button>
        </form>

        <div class="text-center pt-4">
            <a href="index.html"
                class="text-[10px] uppercase tracking-widest text-zinc-500 hover:text-pink-500 transition">← Back to
                Site</a>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // FAKE LOGIN LOGIC
            if ((user === 'tester1' || user === 'tester2') && pass === 'admin') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', user);
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>

</html>

        /**
         * Renders the gallery grid based on current sorting and inventory state.
         * Why: This function separates data from presentation, allowing for dynamic sorting 
         * and a consistent user experience across the collection.
         */
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const sort = document.getElementById('priceFilter').value;
            grid.innerHTML = ''; // Clear existing items

            // Transform object into a list for easier sorting and iteration
            let items = Object.entries(inventory).map(([id, data]) => ({ id, ...data }));

            // Apply price sorting logic
            if (sort === 'high') items.sort((a, b) => b.price - a.price);
            if (sort === 'low') items.sort((a, b) => a.price - b.price);

            // Create and append a card for each sculpture
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card group cursor-pointer';

                // Lightbox integration: clicking a card zooms the sculpture image
                card.onclick = () => {
                    document.getElementById('lightbox-img').src = `namedpics/${item.id}.${item.ext}`;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                const displayName = item.displayName;
                const priceDisplay = `$${item.price}.00`;

                // Parsing logic for energy description
                let baseVibe = "";
                let leafletVibe = "";
                let bindings = "";
                let combined = "";

                const energyParts = item.energy.split(':');
                if (energyParts.length > 1) {
                    combined = energyParts[0].trim();
                    const mainDesc = energyParts[1].split('.');
                    const vibesPart = mainDesc[0].split('+');

                    if (vibesPart.length > 0) {
                        leafletVibe = vibesPart[0].split('for')[1]?.trim() || "";
                    }
                    if (vibesPart.length > 1) {
                        baseVibe = vibesPart[1].split('for')[1]?.trim() || "";
                    }
                    if (mainDesc.length > 1) {
                        bindings = mainDesc[1].trim();
                    }
                } else {
                    combined = "Unique Energy";
                    bindings = item.energy;
                }

                // Build the visual card structure using Tailwind CSS and custom glassmorphism styles
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-square bg-zinc-900 flex items-center justify-center">
                        <img src="namedpics/${item.id}.${item.ext}" 
                             alt="${displayName}" 
                             class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute top-4 right-4 price-tag text-white shadow-lg border border-white/20">${priceDisplay}</div>
                    </div>
                    <div class="p-6 flex-grow flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start gap-4 mb-3">
                                <h3 class="text-xl italic leading-tight group-hover:text-pink-400 transition">${displayName}</h3>
                                <!-- Lead generation: Inquire button passes the item ID via URL params -->
                                <a href="inquiry.html?item=${item.id}" class="text-[9px] bg-pink-500/10 text-pink-500 border border-pink-500/30 px-3 py-1 rounded-full hover:bg-pink-500 hover:text-white transition uppercase tracking-tighter whitespace-nowrap">Inquire</a>
                            </div>
                            <div class="space-y-3 text-[10px] tracking-widest uppercase font-semibold text-zinc-400">
                                <p class="leading-relaxed"><span class="text-pink-500 block mb-0.5">BaseStone:</span> ${item.base} ${baseVibe ? '<br><span class="lowercase text-zinc-500">(' + baseVibe + ')</span>' : ''}</p>
                                <p class="leading-relaxed"><span class="text-pink-500 block mb-0.5">LeafletStone:</span> ${item.leaf} ${leafletVibe ? '<br><span class="lowercase text-zinc-500">(' + leafletVibe + ')</span>' : ''}</p>
                                <p class="leading-relaxed"><span class="text-pink-500 block mb-0.5">Bindings:</span> ${bindings}</p>
                                <p class="leading-relaxed"><span class="text-pink-500 block mb-0.5">Combined:</span> ${combined}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

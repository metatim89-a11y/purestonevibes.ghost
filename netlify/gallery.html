<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grove | Pure Stone Vibes Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="theme.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@300;400;600&display=swap');

        .gallery-card {
            display: flex;
            flex-direction: column;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
        }

        .gallery-card:hover {
            border-color: var(--accent-color);
            transform: scale(1.2) translateY(-10px);
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .card-details {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .gallery-card:hover .card-details {
            max-height: 500px;
            opacity: 1;
            padding-top: 1rem;
        }

        .price-tag {
            background: linear-gradient(to right, var(--accent-color), #be185d);
            padding: 4px 12px;
            border-radius: 99px;
            font-weight: 800;
            font-size: 14px;
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="p-6 glass-nav flex justify-between items-center sticky top-0 z-50">
        <a href="index.html" class="group">
            <h1 class="text-xl font-bold tracking-tighter text-white uppercase group-hover:text-pink-500 transition">
                PURE STONE VIBES</h1>
            <p class="text-[9px] tracking-[0.4em] text-pink-500 font-bold uppercase">← Back to Home</p>
        </a>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex gap-6 text-[10px] uppercase tracking-widest font-bold text-zinc-400">
                <a href="process.html" class="hover:text-pink-400 transition">The Process</a>
                <a href="auction.html" class="hover:text-pink-400 transition">Auctions</a>
                <a href="inquiry.html" class="hover:text-pink-400 transition">Inquire</a>

                <!-- Auth & Theme UI -->
                <div class="flex items-center gap-4 ml-2 pl-4 border-l border-white/10">
                    <button onclick="toggleTheme()" class="hover:text-pink-500 transition" title="Toggle Theme">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707zM12 5a7 7 0 100 14 7 7 0 000-14z">
                            </path>
                        </svg>
                    </button>
                    <a href="login.html" id="login-link"
                        class="text-[10px] uppercase tracking-widest hover:text-pink-500 transition">Login</a>
                    <div id="user-display"
                        class="hidden text-[10px] uppercase tracking-widest text-pink-500 font-bold flex items-center gap-3">
                        <span id="username-val"></span>
                        <button onclick="logout()"
                            class="text-zinc-500 hover:text-white transition lowercase font-normal">[logout]</button>
                    </div>
                </div>
            </div>
            <select id="priceFilter" onchange="renderGallery()"
                class="bg-zinc-900 border border-zinc-800 text-xs px-4 py-2 rounded-full text-pink-400 font-bold focus:outline-none">
                <option value="all">Sort: All Pieces</option>
                <option value="high">Price: High to Low</option>
                <option value="low">Price: Low to High</option>
            </select>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-12 text-center">
        <h2 class="text-5xl mb-4 italic">The <span class="text-pink-500 font-bold not-italic">Grove</span></h2>
        <p class="text-zinc-500 max-w-2xl mx-auto text-sm italic">Curated Collection: 16 Unique Hand-Twisted Sculptures
        </p>
    </header>

    <main class="max-w-[1700px] mx-auto px-4 pb-32">
        <div id="gallery-grid"
            class="grid grid-cols-3 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-3"></div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" class="max-w-[90%] max-h-[90%] rounded shadow-2xl border border-white/10">
    </div>

    <script>
        /**
         * Fetches inventory data from the backend API and initiates the render.
         * Why: This removes hardcoded data from the HTML file, making it easier 
         * to update the collection without editing code files.
         */
        let inventory = {};

        async function initGallery() {
            try {
                const response = await fetch('/api/inventory');
                if (!response.ok) throw new Error('Network response was not ok');
                inventory = await response.ok ? await response.json() : {};
                renderGallery();
            } catch (error) {
                console.error('Failed to load inventory:', error);
                // Fallback or error message could go here
                document.getElementById('gallery-grid').innerHTML = `
                    <div class="col-span-full py-20 text-center opacity-50">
                        <p class="italic">The energy is shifting. Please wait a moment...</p>
                    </div>
                `;
            }
        }

        /**
         * Renders the gallery grid based on current sorting and inventory state.
         * Why: This function separates data from presentation, allowing for dynamic sorting 
         * and a consistent user experience across the collection.
         */
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            const sortSelection = document.getElementById('priceFilter')?.value || 'all';
            grid.innerHTML = ''; // Clear existing items

            // Transform object into a list for easier sorting and iteration
            let items = Object.entries(inventory).map(([id, data]) => ({ id, ...data }));

            // Apply price sorting logic
            if (sortSelection === 'high') items.sort((a, b) => b.price - a.price);
            if (sortSelection === 'low') items.sort((a, b) => a.price - b.price);

            // Create and append a card for each sculpture
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card group cursor-pointer';

                // Lightbox integration: clicking a card zooms the sculpture image
                card.onclick = () => {
                    document.getElementById('lightbox-img').src = `namedpics/${item.id}.${item.ext}`;
                    document.getElementById('lightbox').style.display = 'flex';
                };

                const displayName = item.displayName;
                const priceDisplay = `$${item.price}.00`;

                // Parsing logic for energy description
                let baseVibe = "";
                let leafletVibe = "";
                let bindings = "";
                let combined = "";

                const energyParts = item.energy.split(':');
                if (energyParts.length > 1) {
                    combined = energyParts[0].trim();
                    const mainDesc = energyParts[1].split('.');
                    const vibesPart = mainDesc[0].split('+');

                    if (vibesPart.length > 0) {
                        leafletVibe = vibesPart[0].split('for')[1]?.trim() || "";
                    }
                    if (vibesPart.length > 1) {
                        baseVibe = vibesPart[1].split('for')[1]?.trim() || "";
                    }
                    if (mainDesc.length > 1) {
                        bindings = mainDesc[1].trim();
                    }
                } else {
                    combined = "Unique Energy";
                    bindings = item.energy;
                }

                // Build the visual card structure using Tailwind CSS and custom glassmorphism styles
                card.innerHTML = `
                    <div class="relative overflow-hidden aspect-square bg-zinc-900 flex items-center justify-center">
                        <img src="namedpics/${item.id}.${item.ext}" 
                             alt="${displayName}" 
                             class="w-full h-full object-cover transition-transform duration-1000">
                    </div>
                    <div class="p-2 flex-grow flex flex-col items-center">
                        <h3 class="text-[8px] italic leading-tight text-zinc-400 group-hover:text-pink-400 transition truncate w-full text-center uppercase tracking-tighter">${displayName}</h3>
                        
                        <!-- Collapsible details section revealed on hover -->
                        <div class="card-details w-full">
                            <div class="flex justify-between items-center mb-3 mt-2 pb-2 border-b border-white/10">
                                <span class="price-tag text-white text-[9px] shadow-lg border border-white/20 px-2 py-0.5">${priceDisplay}</span>
                                <a href="inquiry.html?item=${item.id}" class="text-[7px] bg-pink-500/10 text-pink-500 border border-pink-500/30 px-2 py-0.5 rounded-full hover:bg-pink-500 hover:text-white transition uppercase tracking-tighter whitespace-nowrap">Inquire</a>
                            </div>
                            <div class="space-y-2 text-[8px] tracking-widest uppercase font-semibold text-zinc-400 pt-1">
                                <div class="group/info">
                                    <span class="text-pink-500 block mb-0.5 opacity-70">BaseStone:</span>
                                    <div class="pl-2 border-l border-pink-500/10 group-hover/info:border-pink-500/30 transition-colors">
                                        <p class="text-zinc-200">${item.base}</p>
                                        <p class="lowercase text-zinc-500 italic font-normal mt-0.5 leading-tight">${baseVibe}</p>
                                    </div>
                                </div>
                                <div class="group/info">
                                    <span class="text-pink-500 block mb-0.5 opacity-70">LeafletStone:</span>
                                    <div class="pl-2 border-l border-pink-500/10 group-hover/info:border-pink-500/30 transition-colors">
                                        <p class="text-zinc-200">${item.leaf} <span class="lowercase text-zinc-500 italic font-normal">(${leafletVibe})</span></p>
                                    </div>
                                </div>
                                <div class="group/info">
                                    <span class="text-pink-500 block mb-0.5 opacity-70">Bindings:</span>
                                    <p class="pl-2 border-l border-pink-500/10 group-hover/info:border-pink-500/30 transition-colors lowercase text-zinc-500 font-normal leading-tight">${bindings}</p>
                                </div>
                                <div class="group/info">
                                    <span class="text-pink-500 block mb-0.5 opacity-70">Combined:</span>
                                    <p class="pl-2 border-l border-pink-500/10 group-hover/info:border-pink-500/30 transition-colors italic text-zinc-300">${combined}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initial render execution
        initGallery();
    </script>
    <script src="theme.js"></script>
</body>

</html>

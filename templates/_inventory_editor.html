<h4 class="text-xl font-bold text-white mb-4">Inventory Editor</h4>
<div id="inventory-data" class="space-y-3">
    <p class="text-zinc-400">Loading inventory...</p>
</div>
<script>
    async function fetchInventoryForModal() {
        const inventoryDataElement = document.getElementById('inventory-data');
        const token = localStorage.getItem('sessionToken');

        if (!token) {
            inventoryDataElement.innerHTML = '<p class="text-red-400">Not logged in. Please log in.</p>';
            setTimeout(() => window.location.href = '/login.html', 1500);
            return;
        }

        try {
            const response = await fetch('/api/inventory', { headers: { 'Authorization': `Bearer ${token}` } });
            if (response.status === 403 || response.status === 401) {
                localStorage.clear();
                inventoryDataElement.innerHTML = '<p class="text-red-400">Session expired. Please log in.</p>';
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }
            if (!response.ok) throw new Error(`Failed to fetch inventory: ${response.statusText}`);
            const inventory = await response.json();

            let inventoryHtml = '';
            if (inventory.length === 0) {
                inventoryHtml = '<p class="text-zinc-500 italic">No inventory items found.</p>';
            } else {
                inventoryHtml = `
                    <div class="space-y-4">
                        ${inventory.map(item => `
                            <div class="bg-black/20 p-4 rounded-xl border border-white/10">
                                <h5 class="text-lg font-bold text-white">${item.name || 'Untitled'}</h5>
                                <p class="text-sm text-zinc-400">${item.description || 'No description.'}</p>
                                <div class="mt-4 flex gap-4">
                                    <button class="text-xs uppercase tracking-widest text-pink-500 hover:text-white" onclick="editItem('${item.id}')">Edit</button>
                                    <button class="text-xs uppercase tracking-widest text-red-500 hover:text-white" onclick="deleteItem('${item.id}')">Delete</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            inventoryDataElement.innerHTML = inventoryHtml;
        } catch (error) {
            console.error('Error fetching inventory:', error);
            inventoryDataElement.innerHTML = `<p class="text-red-400">Failed to load inventory: ${error.message}</p>`;
        }
    }

    function editItem(itemId) {
        alert('Edit item: ' + itemId); // Placeholder for actual edit logic
    }

    async function deleteItem(itemId) {
        if (!confirm('Are you sure you want to delete this item?')) return;

        const token = localStorage.getItem('sessionToken');
        if (!token) {
            alert('Not logged in. Please log in.');
            window.location.href = '/login.html';
            return;
        }

        try {
            const response = await fetch(`/api/inventory/${itemId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 403 || response.status === 401) {
                localStorage.clear();
                alert('Session expired. Please log in.');
                window.location.href = '/login.html';
                return;
            }
            if (!response.ok) throw new Error(`Failed to delete item: ${response.statusText}`);
            
            alert('Item deleted successfully!');
            fetchInventoryForModal(); // Refresh list
        } catch (error) {
            console.error('Error deleting item:', error);
            alert(`Error deleting item: ${error.message}`);
        }
    }

    fetchInventoryForModal(); // Initial fetch
</script>

<h4 class="text-xl font-bold text-white mb-4">Inventory Editor</h4>
<div id="inventory-data" class="space-y-3">
    <p class="text-zinc-400">Loading inventory...</p>
</div>
<script>
    async function fetchInventoryForModal() {
        try {
            const response = await fetch('/api/inventory', { headers: { 'Authorization': `Bearer ${localStorage.getItem('sessionToken')}` } });
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const inventory = await response.json();
            let inventoryHtml = `
                <div class="space-y-4">
                    ${inventory.map(item => `
                        <div class="bg-black/20 p-4 rounded-xl border border-white/10">
                            <h5 class="text-lg font-bold text-white">${item.name}</h5>
                            <p class="text-sm text-zinc-400">${item.description}</p>
                            <div class="mt-4 flex gap-4">
                                <button class="text-xs uppercase tracking-widest text-pink-500 hover:text-white" onclick="editItem('${item.id}')">Edit</button>
                                <button class="text-xs uppercase tracking-widest text-red-500 hover:text-white" onclick="deleteItem('${item.id}')">Delete</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('inventory-data').innerHTML = inventoryHtml;
        } catch (error) {
            console.error('Error fetching inventory:', error);
            document.getElementById('inventory-data').innerHTML = `<p class="text-red-400">Failed to load inventory: ${error.message}</p>`;
        }
    }
    fetchInventoryForModal();
</script>

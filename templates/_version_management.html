<h4 class="text-xl font-bold text-white mb-4">Version Management</h4>
<div id="version-data" class="space-y-3">
    <p class="text-zinc-400">Loading version...</p>
</div>
<script>
    async function fetchVersionForModal() {
        const versionDataElement = document.getElementById('version-data');
        const token = localStorage.getItem('sessionToken'); // Assuming version update requires auth

        // Check if token exists before trying to fetch
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

        try {
            const response = await fetch('/api/version', { headers: headers });
            // If fetching version is allowed without auth, don't redirect on 401/403 for GET
            if (!response.ok) throw new Error(`Failed to fetch version: ${response.statusText}`);
            const data = await response.json();
            const versionHtml = `
                <p class="text-lg text-white">Current Version: <span class="font-bold text-pink-400">${data.version || 'N/A'}</span></p>
                <div class="mt-4">
                    <label for="new-version-input" class="block text-sm font-medium text-zinc-400 mb-2">Set New Version (requires login):</label>
                    <input type="text" id="new-version-input" value="${data.version || ''}" class="p-2 rounded-lg bg-zinc-800 border border-zinc-700 text-white w-full">
                    <button id="update-version-button" class="mt-4 bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest text-xs transition">Update Version</button>
                </div>
                <p id="version-status-message" class="mt-2 text-sm text-zinc-400"></p>
            `;
            versionDataElement.innerHTML = versionHtml;

            // Add event listener for the update button
            document.getElementById('update-version-button').addEventListener('click', updateVersion);

        } catch (error) {
            console.error('Error fetching version:', error);
            versionDataElement.innerHTML = `<p class="text-red-400">Failed to load version: ${error.message}</p>`;
        }
    }

    async function updateVersion() {
        const newVersionInput = document.getElementById('new-version-input');
        const newVersion = newVersionInput.value;
        const versionStatusMessage = document.getElementById('version-status-message');
        const token = localStorage.getItem('sessionToken');

        if (!token) {
            versionStatusMessage.innerHTML = '<span class="text-red-400">Not logged in. Redirecting...</span>';
            setTimeout(() => window.location.href = '/login.html', 1500);
            return;
        }

        versionStatusMessage.innerHTML = '<span class="text-zinc-400">Updating version...</span>';

        try {
            const response = await fetch('/api/version', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ version: newVersion })
            });

            if (response.status === 403 || response.status === 401) {
                localStorage.clear();
                versionStatusMessage.innerHTML = '<span class="text-red-400">Session expired. Redirecting...</span>';
                setTimeout(() => window.location.href = '/login.html', 1500);
                return;
            }
            if (!response.ok) throw new Error(`Failed to update version: ${response.statusText}`);

            const result = await response.json();
            versionStatusMessage.innerHTML = `<span class="text-emerald-400">${result.message}</span>`;
            // Optionally, refresh the displayed version
            fetchVersionForModal();

        } catch (error) {
            console.error('Error updating version:', error);
            versionStatusMessage.innerHTML = `<span class="text-red-400">Error: ${error.message}</span>`;
        }
    }

    fetchVersionForModal(); // Initial fetch
</script>
